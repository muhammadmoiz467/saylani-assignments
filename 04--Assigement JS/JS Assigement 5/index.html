  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5.3.8 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- Toastify -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="CSS/style.css">

    <title>JS Assignment 5</title>
  </head>

  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark mb-3">
        <div class="container">
          <a class="navbar-brand" href="#">Assigements</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" href="#">Chapter 21 - 25</a>
              </li>
            </ul>

            <form class="d-flex mt-3 mt-lg-0">
              <input class="form-control me-2" type="search" placeholder="Search" />
              <button class="btn btn-outline-light" type="submit">Search</button>
            </form>
          </div>
        </div>
      </nav>
    </header>

    <main>
       <div class="container text-center mb-4">
        <h3 class="text-black py-3" style="border-bottom: 1px solid black;">
          Chapter # 21 - 25 <span class="d-block d-md-inline" style="border-left: 3px solid black; padding-left: 10px;">Strings & It's Methods</span>
        </h3>
      </div>

      <!-- Input Section -->
      <div class="container text-center my-5">
        <div class="row justify-content-center">
          <div class="col-12 col-md-6">
            <h3>Input</h3>
            <div class="box1 rounded-2 d-flex align-items-center p-4">
              <form class="d-flex mb-0 p-0 w-100" role="search">
                <input id="userinputbox" class="form-control rounded-0 rounded-start-2 py-4" style="height: 45px;" type="search"
                  placeholder="Type your text here" aria-label="Search" />
                <button class="btn btn-outline-dark rounded-0 rounded-end-2" type="submit">Clear</button>
              </form>
            </div>
          </div>
          <div class="col-12 col-md-6 mt-5 mt-md-0">
            <h3>Original String</h3>
            <div id="originalStringBox" class="box2 rounded-2 d-flex align-items-center justify-content-center"></div>
          </div>
        </div>
      </div>

      <!-- Buttons + Output Section -->
      <div class="container text-center">
        <div class="row g-4">

          <!-- Buttons -->
          <div class="col-12 col-lg-6">
            <div class="box3 p-3 d-flex justify-content-center align-items-center">
              <div class="row g-2">

                <div class="col-12 col-sm-6"><button class="btn btn-danger w-100 py-2"onclick="lowerCase()">Convert to Lowercase</button></div>

                <div class="col-12 col-sm-6"><button class="btn btn-danger w-100 py-2"onclick="upperCase()">Convert to Uppercase</button>
                </div>

                <div class="col-12 col-sm-6"><button class="btn btn-danger w-100 py-2"onclick="capitalize()">Convert to Captalize</button></div>

                <div class="col-12 col-sm-6"><button class="btn btn-danger w-100 py-2"onclick="betterFormatting()">Better Formatting</button></div>
                
                <div class="col-12 col-sm-6"><button class="btn btn-danger w-100 py-2"onclick="printAllCities()">Print All Cities</button></div>

                <div class="col-12 col-sm-6"><button class="btn btn-danger w-100 py-2"onclick="addCity()">Add Your City In List</button>
                </div>

                <div class="col-12 col-sm-6"><button class="btn btn-danger w-100 py-2"onclick="checkCityInList()">Check Your City In List</button></div>

                <div class="col-12 col-sm-6"><button class="btn btn-danger w-100 py-2"onclick="findThisWord()">Find This Word</button></div>
                
                <!-- Generate Table (Responsive Width + Centered) -->
                <div class="col-12 col-md-6 mx-auto"><button class="btn btn-danger w-100"onclick="replaceThisWord()">Replace This Word</button></div>

              </div>
            </div>
          </div>

          <!-- Output -->
          <div class="col-12 col-lg-6">
            <div id="outputbox" class="box4 p-3 mb-3 text-break"></div>
            <button class="btn btn-outline-dark w-20 mt-3 mb-5" onclick="clearOutput()">
              Clear Output
            </button>
          </div>

        </div>
      </div>
    </main>

    <footer class="mt-4">
      <div class="container-fluid text-light py-2 text-center">
        <h6>&copy; 2026. Assignment By www.moizgujjar.net</h6>
      </div>
    </footer>

    <!-- JS Custom -->
    <script src="js/script.js"></script>

    <!-- Tostify JS -->
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  </body>
  </html>
