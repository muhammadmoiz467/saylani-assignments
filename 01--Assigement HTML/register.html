    <main>
        <hr />
       <center><h1>Register page</h1></center>
      <hr />
      <center> <h2>Please register to continue</h2></center>
      <center><span>All the fields are required.</span></center>
      <hr />
        <form>
            <fieldset style="width: fit-content;margin: auto;">
                <legend>Register</legend>
                <label for="text">Full Name:</label><br />
                <input type="text" placeholder="Full Name" id="text" name="fullName"><br /><br />
                <label for="email">Email:</label><br />
                <input type="email" placeholder="Email" id="email" name="email"><br /><br />
                <label for="password">Password:</label><br />
                <input type="password" placeholder="Password" id="password" name="password"><br /><br />
                <span>Gender:</span><br />
                <label for="male">Male</label>
                <input type="radio" placeholder="Male" id="male" name="Gender">
                <label for="female">Female</label>
                <input type="radio" placeholder="Female" id="female" name="Gender"><br /><br />
                <span>Hobbies:</span><br />
                <label for="music">Music</label>
                <input type="checkbox" placeholder="Music" name="Hobbies" id="music">
                <label for="art">Art</label>
                <input type="checkbox" placeholder="Art" name="Hobbies" id="art">
                <label for="painting">Painting</label>
                <input type="checkbox" placeholder="Painting" name="Hobbies" id="painting"><br /><br />
                <label for="country">Country:</label><br />
                <select name="Country" id="country">
                    <option value="pakistan">Pakistan</option>
                    <option value="usa">USA</option>
                    <option value="china">China</option>
                    <option value="russia">Russia</option>
                    <option value="dubai">Dubai</option>
                    <option value="iran">Iran</option>
                    <option value="turkey">Turkey</option>
                </select>                
                <br /><br />
                <label for="dob">DOB</label>
                <input type="date" name="dob" id="dob"><br /><br />
                <label for="file">Upload your photo:</label><br />
                <input type="file" name="File" id="file">
                <br /><br />
                <input type="submit" value="Register"><br /><br />
                <nav>
                    <a href="already a user">Already a user?</a>
                </nav>
            </fieldset>
        </form>
        <hr />
    </main>
